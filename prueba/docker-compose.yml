services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - .:/app
      - /app/node_modules
      - ./datos:/app/datos

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"           
      - "8443:443"         
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app